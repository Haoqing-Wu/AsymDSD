# Packed FAB semantic/geometric masking model config
#
# With multi_mask=4, produces 2 packed stacks:
#   Semantic stack:
#     A: high-attention visible, 70% masked
#     B: high-attention masked, 50% masked
#   Geometric stack:
#     A: random reverse-block, 70% masked
#     B: random half-space, 50% masked
#
# Inherits all other settings from ssrl_model.yaml.

mask_generator:
  class_path: asymdsd.components.RandomPatchMasking
  init_args:
    mask_ratio: 0.7
    multi_mask: 4

# --- Packed-specific ---
semantic_visible_mask_ratio: 0.75
semantic_masked_mask_ratio: 0.5
geometric_reverse_mask_ratio: 0.75
geometric_halfspace_mask_ratio: 0.5

# Compute patch loss on all four paths, averaged equally per path.
patch_loss_a_only: false

# --- Block parameters ---
# Each block center expands to ~10% of patches via KNN
block_ratio: 0.1

# Let FAB choose the block-center count per path from that path's selected
# quota, so 70/75% and 50% masks can use different block counts.
num_block_centers:

# --- Temperature annealing ---
# High → near-random (early), low → attention-focused (late)
attn_mask_temperature:
  class_path: asymdsd.components.CosineAnnealingWarmupSchedule
  init_args:
    base_value: 2.0
    final_value: 0.3
    max_epochs: -1

attn_mask_top_k: false
attn_layer_index: -1
attn_num_layers: 3
