# Packed FAB masking model config
#
# Pairs complementary masks into packed encoder sequences:
#   Sub-seq A: select_visible=True  (19 vis, 45 masked) — block-coherent visible
#   Sub-seq B: select_visible=False (45 vis, 19 masked) — block-coherent masked
#
# With multi_mask=4, produces 2 packed pairs (normal + inverse attention).
# Both sub-sequences get meaningful block structure (~18 patches from
# 3 KNN-expanded block centers).
#
# Inherits all other settings from ssrl_model.yaml.

mask_generator:
  class_path: asymdsd.components.RandomPatchMasking
  init_args:
    mask_ratio: 0.7
    multi_mask: 4

# --- Packed-specific ---
# Mask ratio for the select_visible=True sub-sequence.
# The complementary (1 - vis_mask_ratio) is used for select_visible=False.
vis_mask_ratio: 0.7

# Only compute patch loss from Sub-seq A (select_visible=True, few visible).
# Sub-seq B still contributes CLS loss but skips the predictor.
# Prevents predictor regime conflict between 20-token and 46-token memory.
patch_loss_a_only: true

# --- Block parameters ---
# Each block center expands to ~10% of patches via KNN
block_ratio: 0.1

# 3 block centers × 6 patches = 18 — fits well with both 19-vis and 19-masked
num_block_centers: 3

# --- Temperature annealing ---
# High → near-random (early), low → attention-focused (late)
attn_mask_temperature:
  class_path: asymdsd.components.CosineAnnealingWarmupSchedule
  init_args:
    base_value: 2.0
    final_value: 0.3
    max_epochs: -1

attn_mask_top_k: false
attn_layer_index: -1

