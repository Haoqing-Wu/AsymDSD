# Packed FAB semantic/geometric masking with auxiliary semantic slots.
#
# This keeps the packed FAB masks/losses and adds K learned slots.  The EMA
# teacher forms slots from the full object; the student forms slots from each
# packed masked path.  Slots are matched with balanced Sinkhorn assignment, so
# no real part labels are required.

mask_generator:
  class_path: asymdsd.components.RandomPatchMasking
  init_args:
    mask_ratio: 0.7
    multi_mask: 6

# --- Semantic block+sparse paths ---
semantic_visible_mask_ratio: 0.7
semantic_masked_mask_ratio: 0.5

# --- Semantic sparse-only paths ---
sparse_visible_mask_ratio: 0.7
sparse_masked_mask_ratio: 0.5

# --- Geometric paths ---
geometric_reverse_mask_ratio: 0.7
geometric_halfspace_mask_ratio: 0.5

# Compute patch loss on all six paths, averaged equally per path.
patch_loss_a_only: false

# Use FlashAttention varlen for zero-waste packing (requires PyTorch >= 2.4).
# Falls back to separate encoder calls when unavailable or when
# relative_3d_bias is enabled.
use_varlen_flash_attn: true

# --- Semantic slot objective ---
num_semantic_slots: 8
semantic_slot_loss_weight: 0.1
semantic_slot_diversity_weight: 0.02
semantic_slot_temperature: 0.1
semantic_slot_matching_temperature: 0.05
semantic_slot_sinkhorn_iters: 3
semantic_slot_num_heads:
semantic_slot_hidden_ratio: 2.0
semantic_slot_dropout_p: 0.0
semantic_slot_include_cls: false

# --- Block parameters (for semantic block+sparse paths) ---
# Each block center expands to ~10% of patches via KNN
block_ratio: 0.1

# Let FAB choose the block-center count per path from that path's selected
# quota, so different mask ratios can use different block counts.
num_block_centers:

# --- Temperature annealing ---
# High -> near-random (early), low -> attention-focused (late)
attn_mask_temperature:
  class_path: asymdsd.components.CosineAnnealingWarmupSchedule
  init_args:
    base_value: 2.0
    final_value: 0.5
    max_epochs: -1

attn_mask_top_k: false
attn_layer_index: -1
attn_num_layers: 3
