# Fused attention-block masking model config
#
# Combines attention-guided block centers (KNN-expanded) with
# attention-guided sparse patches.  Temperature annealing transitions
# from InverseBlock-like random masking (early) to structured semantic
# masking (late).
#
# Inherits all other settings from ssrl_model.yaml.

mask_generator:
  class_path: asymdsd.components.RandomPatchMasking
  init_args:
    mask_ratio: 0.7
    multi_mask: 4

# --- Block parameters ---
# Each block center expands to ~10% of patches via KNN
block_ratio: 0.1

# Auto-compute: ~60% of mask from blocks, ~40% sparse
# (set explicitly to override)
# num_block_centers: 5
# sparse_ratio: 0.4

# --- Temperature annealing ---
# High → near-random (early), low → attention-focused (late)
attn_mask_temperature:
  class_path: asymdsd.components.CosineAnnealingWarmupSchedule
  init_args:
    base_value: 2.0
    final_value: 0.3
    max_epochs: -1

attn_mask_top_k: false
attn_layer_index: -1
