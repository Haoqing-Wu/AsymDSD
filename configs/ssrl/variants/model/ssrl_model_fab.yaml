# Fused attention-block masking model config
#
# Combines attention-guided block centers (KNN-expanded) with
# attention-guided sparse patches.  Temperature annealing transitions
# from InverseBlock-like random masking (early) to structured semantic
# masking (late).
#
# Inherits all other settings from ssrl_model.yaml.

mask_generator:
  class_path: asymdsd.components.RandomPatchMasking
  init_args:
    mask_ratio: 0.7
    multi_mask: 4

# --- Block parameters ---
# Each block center expands to ~10% of patches via KNN
block_ratio: 0.1

# Of multi_mask=4, how many use inverted attention (mask low-attn patches).
# Only used when num_select_visible_masks=0 (legacy mode).
num_inverse_masks: 2

# If true, attention blocks define *visible* patches (encoder input),
# everything else is masked.  Guarantees coherent visible regions.
# If false (default), attention blocks define *masked* patches.
# Only used when num_select_visible_masks=0 (legacy mode).
select_visible: true

# Mixed select_visible mode: first N masks use select_visible=True,
# remaining attention-guided masks use select_visible=False.
# Within each group, half are normal (high-attn) and half inverse (low-attn).
# E.g. 2 means: mask0=vis+normal, mask1=vis+inverse,
#                mask2=masked+normal, mask3=masked+inverse.
# 0 disables mixed mode, falling back to global select_visible + num_inverse.
num_select_visible_masks: 2

# How many masks use inverse-block random masking (no attention bias,
# random spatial blocks — same as base AsymDSD masking strategy).
# Carved from multi_mask budget.
num_random_masks: 0

# 3 visible blocks × 6 patches ≈ 16 block + ~3 sparse = 19 visible
num_block_centers: 3
# sparse_ratio: 0.4

# --- Temperature annealing ---
# High → near-random (early), low → attention-focused (late)
attn_mask_temperature:
  class_path: asymdsd.components.CosineAnnealingWarmupSchedule
  init_args:
    base_value: 2.0
    final_value: 0.3
    max_epochs: -1

attn_mask_top_k: false
attn_layer_index: -1

# --- Relative 3D bias in encoder attention ---
# num_heads is automatically synced from encoder_config.num_heads
encoder_config:
  relative_3d_bias:
    class_path: asymdsd.layers.Relative3DBiasConfig
    init_args:
      hidden_dim: 64
      use_distance: true

attn_bias_scale: 1.0
