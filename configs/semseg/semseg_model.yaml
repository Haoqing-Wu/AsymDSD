#   (type: <class 'PointEncoder'>, default: {'class_path': 'asymsd.models.PointEncoder'}, known subclasses: asymsd.models.PointEncoder)
point_encoder:
  class_path: asymsd.models.PointEncoder
  init_args:
    patchify:
      # class_path: asymsd.layers.MultiPointPatchify
      # init_args:
      #   num_patches: [64]
      #   patch_size: [32]
    cls_token: true
    patch_embedding:
      class_path: asymsd.layers.PatchEmbeddingConfig
      init_args:
        position_embedding:
          class_path: asymsd.layers.tokenization.PositionEmbeddingConfig
          init_args:
            in_features: 3
            act_layer: torch.nn.GELU
            normalize: false
        point_embedding:
          class_path: asymsd.layers.tokenization.MemEfficientPointMaxEmbeddingConfig
          init_args:
            in_features: 3
            allow_grad_ckpt: false
            hidden_dims:
              - 128
              - 256
              - 512
            act_layer: torch.nn.GELU
            norm_layer: asymsd.layers.RMSNorm
            bias: false
            process_num_chunks: 1
        normalize_patches: false
    encoder:
      embed_dim: 384
      num_heads: 6
      num_layers: 12
      hidden_ratio: 4.0
      norm_layer: asymsd.layers.RMSNorm
      act_layer: torch.nn.GELU
      dropout_p: 0.0
      drop_path_p: 0.2
      uniform_drop_path: false
      efficient_drop_path: false
      add_pos_enc_every_layer: true
      layer_scale_init:
      bias: false
      allow_grad_ckpt: false

