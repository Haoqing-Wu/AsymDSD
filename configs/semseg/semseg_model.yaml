freeze_encoder: false

#   (type: bool, default: True)
map_avg_pooling: true

#   (type: bool, default: True)
map_max_pooling: true

#   (type: bool, default: True)
map_cls_token: true

#   (type: list[int], default: [3, 7, 11])
extract_hidden_layers:
- 3
- 7
- 11

