class_path: asymdsd.SupervisedZarrPCDataModule
init_args:
  name: ScanObjectNN/OBJ_BG
  dataset: /Volumes/westeurope_extollo_rd_eu_rd_k_data_analytics_adbv/rd_k_warehouse/rd_k_katalog/asymdsd_data/ScanObjectNN.zarr
  dataset_builder:
    class_path: asymdsd.data.datasets_.ScanObjectNNBuilder
    init_args:
      data_path: /Volumes/westeurope_extollo_rd_eu_rd_k_data_analytics_adbv/rd_k_warehouse/rd_k_katalog/asymdsd_data/ScanObjectNN/h5_files.zip
  num_workers_create_ds: 8
  split_map:
    train:
      - OBJ_BG_train
    test:
      - OBJ_BG_test
  batch_size: 32
  max_num_points: 2048
  augmentation_transform:
    - class_path: asymdsd.data.RandomRotateAxisPC
      init_args:
        axis: "Z"
    - class_path: asymdsd.data.RandomAnisotropicScalePC
      init_args:
        scale_range: [0.9, 1.1]
  subsample_mode: UNIFORM
  patchify:
    class_path: asymdsd.data.PatchifyPC
    init_args:
      num_patches: 128
      patch_size: 32
  num_workers_train: 16
  num_workers_val_test: 16
  pin_memory: true
  deterministic_val_data: false
